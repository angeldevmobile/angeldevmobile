<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: 'Courier New', Courier, monospace; }

    /* ===== Grid de fondo ===== */
    .gridline { stroke: #164e63; stroke-width: 0.5; opacity: 0.25; }

    /* ===== Lluvia matrix ===== */
    .rain  { fill: #22d3ee; opacity: 0.16; font-size: 14px; }
    .rain2 { fill: #34d399; opacity: 0.12; font-size: 12px; }
    .col { animation: fall 6s linear infinite; }
    .c1 { animation-delay: 0s; }
    .c2 { animation-delay: -1.2s; animation-duration: 7s; }
    .c3 { animation-delay: -2.5s; animation-duration: 5s; }
    .c4 { animation-delay: -0.7s; animation-duration: 8s; }
    .c5 { animation-delay: -3.4s; animation-duration: 6.5s; }
    .c6 { animation-delay: -1.8s; animation-duration: 5.5s; }
    .c7 { animation-delay: -4.1s; animation-duration: 7.5s; }
    .c8 { animation-delay: -2.9s; animation-duration: 6s; }
    @keyframes fall {
      from { transform: translateY(-360px); }
      to   { transform: translateY(360px); }
    }

    /* ===== Avatar scanner ===== */
    .frame { stroke: #22d3ee; stroke-width: 1.5; fill: rgba(34,211,238,0.04); }
    .bracket { stroke: #22d3ee; stroke-width: 3; fill: none; }
    .silhouette { fill: #22d3ee; opacity: 0.75; }
    .scanline {
      fill: url(#scanGrad);
      animation: scan 2.6s ease-in-out infinite alternate;
    }
    @keyframes scan {
      from { transform: translateY(0px); }
      to   { transform: translateY(150px); }
    }
    .ring {
      stroke: #22d3ee; stroke-width: 1.5; fill: none;
      stroke-dasharray: 40 14;
      transform-origin: 160px 160px;
      animation: spin 8s linear infinite;
      opacity: 0.5;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .scantext {
      fill: #22d3ee; font-size: 12px; letter-spacing: 3px;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0.25; } }

    /* ===== Campos que se llenan solos ===== */
    .label { fill: #22d3ee; font-size: 15px; }
    .value { fill: #e2e8f0; font-size: 16px; }
    .field { width: 0; overflow: hidden; }
    .f1 { animation: t1 0.9s steps(12) 0.5s forwards; }
    .f2 { animation: t2 1.1s steps(20) 1.6s forwards; }
    .f3 { animation: t3 1.3s steps(26) 2.9s forwards; }
    .f4 { animation: t4 1.5s steps(30) 4.4s forwards; }
    @keyframes t1 { to { width: 135px; } }
    @keyframes t2 { to { width: 215px; } }
    @keyframes t3 { to { width: 275px; } }
    @keyframes t4 { to { width: 320px; } }

    /* Status aparece al final */
    .status {
      opacity: 0;
      animation: appear 0.4s ease 6s forwards;
    }
    @keyframes appear { to { opacity: 1; } }
    .dot {
      fill: #34d399;
      animation: pulse 1.6s ease-in-out 6s infinite;
      opacity: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .cursor { fill: #34d399; animation: blink 1s step-end infinite; }

    /* Glow del título */
    .title {
      fill: #f1f5f9; font-size: 34px; font-weight: bold; letter-spacing: 5px;
      filter: drop-shadow(0 0 8px rgba(34,211,238,0.6));
    }
    .subtitle { fill: #22d3ee; font-size: 14px; letter-spacing: 6px; }
  </style>

  <defs>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="20" y="20" width="860" height="300" rx="16"/></clipPath>
    <clipPath id="frameClip"><rect x="85" y="85" width="150" height="170" rx="10"/></clipPath>
  </defs>

  <!-- Fondo -->
  <rect width="900" height="340" fill="#0d1117"/>
  <rect x="20" y="20" width="860" height="300" rx="16" fill="#0b1220" stroke="#1e293b" stroke-width="1.5"/>

  <g clip-path="url(#cardClip)">
    <!-- Lluvia matrix -->
    <g class="mono rain">
      <text class="col c1" x="45" y="0">1<tspan x="45" dy="22">0</tspan><tspan x="45" dy="22">$</tspan><tspan x="45" dy="22">{</tspan><tspan x="45" dy="22">1</tspan><tspan x="45" dy="22">;</tspan><tspan x="45" dy="22">0</tspan><tspan x="45" dy="22">x</tspan><tspan x="45" dy="22">}</tspan><tspan x="45" dy="22">1</tspan><tspan x="45" dy="22">0</tspan><tspan x="45" dy="22">&gt;</tspan><tspan x="45" dy="22">=</tspan><tspan x="45" dy="22">1</tspan></text>
      <text class="col c3" x="265" y="0">0<tspan x="265" dy="22">x</tspan><tspan x="265" dy="22">A</tspan><tspan x="265" dy="22">F</tspan><tspan x="265" dy="22">0</tspan><tspan x="265" dy="22">1</tspan><tspan x="265" dy="22">%</tspan><tspan x="265" dy="22">#</tspan><tspan x="265" dy="22">0</tspan><tspan x="265" dy="22">1</tspan><tspan x="265" dy="22">C</tspan><tspan x="265" dy="22">0</tspan><tspan x="265" dy="22">D</tspan><tspan x="265" dy="22">E</tspan></text>
      <text class="col c5" x="770" y="0">{<tspan x="770" dy="22">}</tspan><tspan x="770" dy="22">1</tspan><tspan x="770" dy="22">0</tspan><tspan x="770" dy="22">=</tspan><tspan x="770" dy="22">&gt;</tspan><tspan x="770" dy="22">0</tspan><tspan x="770" dy="22">1</tspan><tspan x="770" dy="22">$</tspan><tspan x="770" dy="22">_</tspan><tspan x="770" dy="22">1</tspan><tspan x="770" dy="22">0</tspan><tspan x="770" dy="22">;</tspan><tspan x="770" dy="22">1</tspan></text>
      <text class="col c7" x="855" y="0">O<tspan x="855" dy="22">R</tspan><tspan x="855" dy="22">1</tspan><tspan x="855" dy="22">0</tspan><tspan x="855" dy="22">N</tspan><tspan x="855" dy="22">0</tspan><tspan x="855" dy="22">1</tspan><tspan x="855" dy="22">A</tspan><tspan x="855" dy="22">I</tspan><tspan x="855" dy="22">1</tspan><tspan x="855" dy="22">0</tspan><tspan x="855" dy="22">0</tspan><tspan x="855" dy="22">1</tspan><tspan x="855" dy="22">0</tspan></text>
    </g>
    <g class="mono rain2">
      <text class="col c2" x="30" y="0">t<tspan x="30" dy="20">s</tspan><tspan x="30" dy="20">1</tspan><tspan x="30" dy="20">0</tspan><tspan x="30" dy="20">p</tspan><tspan x="30" dy="20">y</tspan><tspan x="30" dy="20">0</tspan><tspan x="30" dy="20">1</tspan><tspan x="30" dy="20">d</tspan><tspan x="30" dy="20">a</tspan><tspan x="30" dy="20">r</tspan><tspan x="30" dy="20">t</tspan><tspan x="30" dy="20">1</tspan><tspan x="30" dy="20">0</tspan><tspan x="30" dy="20">0</tspan></text>
      <text class="col c4" x="255" y="0">1<tspan x="255" dy="20">0</tspan><tspan x="255" dy="20">1</tspan><tspan x="255" dy="20">1</tspan><tspan x="255" dy="20">0</tspan><tspan x="255" dy="20">0</tspan><tspan x="255" dy="20">1</tspan><tspan x="255" dy="20">0</tspan><tspan x="255" dy="20">1</tspan><tspan x="255" dy="20">1</tspan><tspan x="255" dy="20">0</tspan><tspan x="255" dy="20">1</tspan><tspan x="255" dy="20">0</tspan><tspan x="255" dy="20">0</tspan><tspan x="255" dy="20">1</tspan></text>
      <text class="col c6" x="790" y="0">0<tspan x="790" dy="20">1</tspan><tspan x="790" dy="20">1</tspan><tspan x="790" dy="20">0</tspan><tspan x="790" dy="20">1</tspan><tspan x="790" dy="20">0</tspan><tspan x="790" dy="20">0</tspan><tspan x="790" dy="20">1</tspan><tspan x="790" dy="20">1</tspan><tspan x="790" dy="20">0</tspan><tspan x="790" dy="20">1</tspan><tspan x="790" dy="20">1</tspan><tspan x="790" dy="20">0</tspan><tspan x="790" dy="20">0</tspan><tspan x="790" dy="20">1</tspan></text>
      <text class="col c8" x="840" y="0">A<tspan x="840" dy="20">I</tspan><tspan x="840" dy="20">0</tspan><tspan x="840" dy="20">1</tspan><tspan x="840" dy="20">M</tspan><tspan x="840" dy="20">L</tspan><tspan x="840" dy="20">1</tspan><tspan x="840" dy="20">0</tspan><tspan x="840" dy="20">0</tspan><tspan x="840" dy="20">1</tspan><tspan x="840" dy="20">1</tspan><tspan x="840" dy="20">0</tspan><tspan x="840" dy="20">1</tspan><tspan x="840" dy="20">0</tspan><tspan x="840" dy="20">1</tspan></text>
    </g>

    <!-- Grid -->
    <g class="gridline">
      <line x1="20" y1="80" x2="880" y2="80"/><line x1="20" y1="140" x2="880" y2="140"/>
      <line x1="20" y1="200" x2="880" y2="200"/><line x1="20" y1="260" x2="880" y2="260"/>
      <line x1="120" y1="20" x2="120" y2="320"/><line x1="240" y1="20" x2="240" y2="320"/>
      <line x1="360" y1="20" x2="360" y2="320"/><line x1="480" y1="20" x2="480" y2="320"/>
      <line x1="600" y1="20" x2="600" y2="320"/><line x1="720" y1="20" x2="720" y2="320"/>
    </g>

    <!-- Barra terminal -->
    <rect x="20" y="20" width="860" height="36" rx="16" fill="#0f172a"/>
    <rect x="20" y="40" width="860" height="16" fill="#0f172a"/>
    <circle cx="48" cy="38" r="6" fill="#ff5f57"/>
    <circle cx="70" cy="38" r="6" fill="#febc2e"/>
    <circle cx="92" cy="38" r="6" fill="#28c840"/>
    <text class="mono" x="450" y="43" text-anchor="middle" fill="#64748b" font-size="13">angel@dev: ~/id-card — scanning profile</text>

    <!-- ===== PANEL IZQUIERDO: escáner biométrico ===== -->
    <circle class="ring" cx="160" cy="160" r="95"/>
    <rect class="frame" x="85" y="85" width="150" height="170" rx="10"/>

    <!-- Silueta de usuario -->
    <g clip-path="url(#frameClip)">
      <circle class="silhouette" cx="160" cy="150" r="30"/>
      <path class="silhouette" d="M 105 255 Q 105 195 160 195 Q 215 195 215 255 Z"/>
      <!-- Línea de escaneo -->
      <rect class="scanline" x="85" y="85" width="150" height="26"/>
    </g>

    <!-- Brackets de esquina -->
    <path class="bracket" d="M 85 105 L 85 85 L 105 85"/>
    <path class="bracket" d="M 215 85 L 235 85 L 235 105"/>
    <path class="bracket" d="M 235 235 L 235 255 L 215 255"/>
    <path class="bracket" d="M 105 255 L 85 255 L 85 235"/>

    <text class="mono scantext" x="160" y="285" text-anchor="middle">[ SCANNING... ]</text>

    <!-- ===== PANEL DERECHO: ficha auto-rellenable ===== -->
    <text class="mono title" x="300" y="115">ANGEL ZAPATA</text>
    <text class="mono subtitle" x="302" y="140">// DEVELOPER ID CARD</text>

    <!-- NAME -->
    <text class="mono label" x="300" y="180">&gt; NAME:</text>
    <svg x="395" y="165" width="340" height="22" class="field f1">
      <text class="mono value" x="0" y="15">Angel Zapata</text>
    </svg>

    <!-- ROLE -->
    <text class="mono label" x="300" y="210">&gt; ROLE:</text>
    <svg x="395" y="195" width="340" height="22" class="field f2">
      <text class="mono value" x="0" y="15">Full Stack Developer</text>
    </svg>

    <!-- STACK -->
    <text class="mono label" x="300" y="240">&gt; STACK:</text>
    <svg x="400" y="225" width="340" height="22" class="field f3">
      <text class="mono value" x="0" y="15">TypeScript · Python · Dart</text>
    </svg>

    <!-- FOCUS -->
    <text class="mono label" x="300" y="270">&gt; FOCUS:</text>
    <svg x="400" y="255" width="360" height="22" class="field f4">
      <text class="mono value" x="0" y="15">Orion — AI Platform &amp; Language</text>
    </svg>

    <!-- STATUS -->
    <g class="status">
      <text class="mono label" x="300" y="300">&gt; STATUS:</text>
      <text class="mono" x="412" y="300" fill="#34d399" font-size="16">ONLINE — open to collaborate</text>
    </g>
    <circle class="dot" cx="398" cy="295" r="5"/>
    <rect class="cursor" x="700" y="287" width="9" height="16"/>
  </g>
</svg>
